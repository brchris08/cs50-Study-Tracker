{% extends 'logs/base.html' %}
{% block content %}
<div class="cs-card p-5 text-center fade-up" style="max-width: 500px; margin: 4rem auto;">
    <i class="bi bi-exclamation-triangle text-danger" style="font-size: 3rem;"></i>
    <h2 class="mt-3">Delete Session?</h2>
    <p class="text-muted">Are you sure you want to delete <strong>"{{ session.topic }}"</strong>? This cannot be undone.</p>
    
    <form method="post">
        {% csrf_token %}
        <div class="d-flex justify-content-center gap-3 mt-4">
            <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">Cancel</a>
            <button type="submit" class="btn btn-danger">Confirm Delete</button>
        </div>
    </form>
</div>
{% endblock %}
